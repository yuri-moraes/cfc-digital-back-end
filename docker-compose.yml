services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cfc
      POSTGRES_PASSWORD: cfc_password
      POSTGRES_DB: cfc_digital_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfc -d cfc_digital_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cfc
      POSTGRES_PASSWORD: cfc_password
      POSTGRES_DB: cfc_digital_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfc -d cfc_digital_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
